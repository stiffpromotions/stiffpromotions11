id: artist_submission
title: 'Artist submission'
description: ''
categories: {  }
elements: |-
  flexbox:
    '#type': webform_flexbox
    artist_band_name:
      '#type': textfield
      '#title': 'Artist / band name'
      '#required': true
    contact_name:
      '#type': textfield
      '#title': 'Contact name'
      '#required': true
  flexbox_01:
    '#type': webform_flexbox
    email:
      '#type': email
      '#title': Email
      '#required': true
    phone:
      '#type': tel
      '#title': Phone
  flexbox_02:
    '#type': webform_flexbox
    link_youtube:
      '#type': url
      '#title': 'Link: YouTube'
    link_spotify:
      '#type': url
      '#title': 'Link: Spotify'
  flexbox_03:
    '#type': webform_flexbox
    link_social_media_main:
      '#type': url
      '#title': 'Link: Social Media (primary)'
    link_social_media_secondary:
      '#type': url
      '#title': 'Link: Social Media (secondary)'
  flexbox_04:
    '#type': webform_flexbox
    bookings_last_year:
      '#type': select
      '#title': 'Number of shows last year?'
      '#options':
        '1_10': 1-10
        '11_20': 11-20
        '21_30': 21-30
        '31_40': 31-40
        '41_50': 41-50
        '51_75': 51-75
        75_plus: 75+
      '#empty_option': 'Please select'
    bookings_this_year:
      '#type': select
      '#title': 'Number of bookings this year?'
      '#options':
        '1_10': 1-10
        '11_20': 11-20
        '21_30': 21-30
        '31_40': 31-40
        '41_50': 41-50
        '51_75': 51-75
        75_plus: 75+
      '#empty_option': 'Please select'
  reason_for_representation:
    '#type': textarea
    '#title': 'Why do you want to be represented by Stiff Promotions?'
  legal:
    '#type': checkbox
    '#title': Legal
    '#description': '<p>I accept the Terms &amp; Conditions and Privacy and Cookie Policies</p>'
    '#title_display': invisible
    '#description_display': after
    '#required': true
